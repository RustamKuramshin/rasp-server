# HTTP (только для Let's Encrypt и редирект всего остального)
server {
    listen 80;
    server_name api.vibe-data.javaboys.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS - api.vibe-data.javaboys.ru
server {
    listen 443 ssl;
    server_name api.vibe-data.javaboys.ru;

    ssl_certificate /etc/letsencrypt/live/api.vibe-data.javaboys.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.vibe-data.javaboys.ru/privkey.pem;

    limit_req zone=botlimit burst=20 nodelay;
    include /etc/nginx/snippets/blocked-paths.conf;

    location / {
        proxy_pass http://172.17.0.1:8086;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
